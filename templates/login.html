<!DOCTYPE html>
<html>
<head>
    <title>Edu Guard Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1a237e;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #1a237e;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0d47a1;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <h1>🎓 Edu Guard</h1>
        <p>Student Dropout Prevention System</p>
    </div>

    <form action="/login" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username">

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password">

        <button type="submit">Login →</button>
    </form>

    <div class="footer">Edu Guard © 2026 | Mini Project</div>
</div>

</body>
</html>
