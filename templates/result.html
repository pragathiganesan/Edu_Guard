<!DOCTYPE html>
<html>
<head>
    <title>Edu Guard - Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .topbar {
            background: #1a237e;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 32px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .topbar h2 { font-size: 18px; }
        .topbar span { font-size: 13px; opacity: 0.8; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        /* --- Student Data Summary --- */
        .summary-title {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .data-box {
            background: #f7f9ff;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .data-box .value {
            font-size: 28px;
            font-weight: 700;
            color: #1a237e;
        }

        .data-box .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 28px 0;
        }

        /* --- Result Box --- */
        .result-box {
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            margin-bottom: 28px;
        }

        .result-box.high {
            background: #fff5f5;
            border: 2px solid #f44336;
        }

        .result-box.low {
            background: #f1fff5;
            border: 2px solid #4caf50;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-box.high .result-title { color: #c62828; }
        .result-box.low .result-title { color: #2e7d32; }

        .result-rec {
            font-size: 15px;
            font-weight: 500;
        }

        .result-box.high .result-rec { color: #e53935; }
        .result-box.low .result-rec { color: #43a047; }

        /* --- Back Button --- */
        .back-btn {
            display: block;
            width: 100%;
            padding: 13px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover { background: #0d47a1; }
    </style>
</head>
<body>

<div class="topbar">
    <h2>🎓 Edu Guard Dashboard</h2>
    <span>Prediction Result</span>
</div>

<div class="card">

    <!-- Student Data Summary -->
    <div class="summary-title">Student Data Entered</div>
    <div class="data-grid">
        <div class="data-box">
            <div class="value">{{ attendance }}%</div>
            <div class="label">Attendance</div>
        </div>
        <div class="data-box">
            <div class="value">{{ marks }}%</div>
            <div class="label">Marks</div>
        </div>
        <div class="data-box">
            <div class="value">{{ engagement }}</div>
            <div class="label">Engagement</div>
        </div>
    </div>

    <hr class="divider">

    <!-- Result -->
    <div class="result-box {{ risk_class }}">
        <div class="result-icon">{{ icon }}</div>
        <div class="result-title">{{ risk }}</div>
        <div class="result-rec">{{ recommendation }}</div>
    </div>

    <!-- Back Button -->
    <a href="/predict" class="back-btn">← Check Another Student</a>

</div>

</body>
</html>
